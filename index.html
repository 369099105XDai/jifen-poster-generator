<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>积分兑换海报预览</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 480px;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #333;
            box-sizing: border-box;
        }
        .preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d15;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 style="color:#fff;margin-top:0;">积分兑换海报预览</h2>
            <p>请在右侧预览区域操作</p>
        </div>
        <div class="preview">
            <iframe src="preview.html"></iframe>
        </div>
    </div>
</body>
</html>
